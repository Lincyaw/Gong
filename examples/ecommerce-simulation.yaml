apiVersion: simulation.aiops.research/v1alpha1
kind: SimulationSpec
metadata:
  name: ecommerce-black-friday
  description: E-commerce simulation for Black Friday scenario

spec:
  name: ecommerce-black-friday
  description: "E-commerce microservices with high traffic simulation"
  
  services:
    - name: user-service
      replicas: 2
      resources:
        requests:
          cpu: "200m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      
      dependencies:
        datastores:
          - name: users-db
            type: postgres
            provisioning:
              mode: dynamic
              chart: "bitnami/postgresql:13.x"
            teardown_policy: deletePvc
      
      observability:
        logging:
          level: INFO
          format: JSON
        tracing:
          sampling_rate: 0.8
      
      endpoints:
        - path: /v1/users/{user_id}
          method: GET
          workflow:
            - name: get_user_from_db
              template: io/postgres_query
              params:
                datastore_name: users-db
                query: "SELECT * FROM users WHERE id = $1"
                query_params: ["{path.user_id}"]
              output: user_data
            
            - name: return_user_response
              template: control_flow/return_response
              params:
                status_code: 200
                body: "{context.user_data}"

    - name: product-service
      replicas: 3
      resources:
        requests:
          cpu: "300m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
      
      dependencies:
        datastores:
          - name: products-db
            type: postgres
            provisioning:
              mode: dynamic
              chart: "bitnami/postgresql:13.x"
          - name: product-cache
            type: redis
            provisioning:
              mode: dynamic
              chart: "bitnami/redis:6.x"
      
      endpoints:
        - path: /v1/products/{product_id}
          method: GET
          workflow:
            - name: check_cache
              template: io/redis_get
              params:
                datastore_name: product-cache
                key: "product:{path.product_id}"
              output: cached_product
              inject_faults:
                - type: latency
                  probability: 0.1
                  value: "normal(50, 10)"
            
            - name: get_from_db_if_not_cached
              template: control_flow/conditional_branch
              params:
                condition: "{context.cached_product} is None"
                if_true:
                  - name: query_database
                    template: io/postgres_query
                    params:
                      datastore_name: products-db
                      query: "SELECT * FROM products WHERE id = $1"
                      query_params: ["{path.product_id}"]
                    output: product_data
                  
                  - name: cache_result
                    template: io/redis_set
                    params:
                      datastore_name: product-cache
                      key: "product:{path.product_id}"
                      value: "{context.product_data}"
                      ttl: 3600
            
            - name: return_product
              template: control_flow/return_response
              params:
                status_code: 200
                body: "{context.cached_product or context.product_data}"

    - name: order-service
      replicas: 5
      resources:
        requests:
          cpu: "400m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
      
      dependencies:
        services:
          - user-service
          - product-service
        datastores:
          - name: orders-db
            type: postgres
            provisioning:
              mode: dynamic
              chart: "bitnami/postgresql:13.x"
      
      endpoints:
        - path: /v1/orders
          method: POST
          workflow:
            - name: validate_auth_token
              template: security/jwt_validation
              params:
                token: "{header.Authorization}"
                jwks_url: "https://auth.example.com/.well-known/jwks.json"
              on_failure: "return_401_unauthorized"
            
            - name: get_user_and_product_parallel
              template: control_flow/parallel_execution
              branches:
                - name: get_user_info
                  template: io/http_api_call
                  params:
                    target_service: user-service
                    path: "/v1/users/{body.userId}"
                    method: GET
                  output: user_profile
                
                - name: get_product_info
                  template: io/http_api_call
                  params:
                    target_service: product-service
                    path: "/v1/products/{body.productId}"
                    method: GET
                  output: product_details
            
            - name: calculate_total
              template: logic/custom_function_call
              params:
                function_name: calculate_order_total
                arguments:
                  price: "{context.product_details.price}"
                  quantity: "{body.quantity}"
                  discount_level: "{context.user_profile.discount_level}"
              output: final_price
            
            - name: save_order_to_db
              template: io/postgres_write
              inject_faults:
                - type: latency
                  probability: 0.05
                  value: "normal(150, 20)"
                - type: error
                  probability: 0.02
                  value: "database_timeout"
              params:
                datastore_name: orders-db
                query: "INSERT INTO orders (user_id, product_id, quantity, total) VALUES ($1, $2, $3, $4) RETURNING id"
                query_params:
                  - "{body.userId}"
                  - "{body.productId}"
                  - "{body.quantity}"
                  - "{context.final_price}"
              output: order_id
            
            - name: return_order_response
              template: control_flow/return_response
              params:
                status_code: 201
                body:
                  orderId: "{context.order_id}"
                  userId: "{body.userId}"
                  productId: "{body.productId}"
                  quantity: "{body.quantity}"
                  total: "{context.final_price}"
                  status: "created"

  scenario:
    name: black-friday-traffic
    description: "Simulate Black Friday traffic patterns with chaos"
    events:
      - timestamp: "0s"
        type: traffic
        config:
          name: baseline-traffic
          type: constant
          params:
            users: 10
            spawn_rate: 1
            target_host: "order-service"
      
      - timestamp: "5m"
        type: traffic
        config:
          name: ramp-up-traffic
          type: ramp
          params:
            start_users: 10
            end_users: 100
            duration: "10m"
            target_host: "order-service"
      
      - timestamp: "10m"
        type: chaos
        config:
          name: product-service-latency
          type: network-latency
          target:
            service: product-service
          params:
            latency: "500ms"
            duration: "5m"
      
      - timestamp: "20m"
        type: traffic
        config:
          name: peak-traffic
          type: spike
          params:
            users: 500
            duration: "15m"
            target_host: "order-service"
      
      - timestamp: "25m"
        type: chaos
        config:
          name: database-pod-failure
          type: pod-delete
          target:
            service: orders-db
          params:
            count: 1

  global_config:
    observability:
      jaeger_endpoint: "http://jaeger:14268/api/traces"
      prometheus_endpoint: "http://prometheus:9090"
      loki_endpoint: "http://loki:3100"
    
    resource_limits:
      max_cpu_per_service: "2000m"
      max_memory_per_service: "2Gi"
      max_services: 20
    
    network_policies:
      default_deny: true
      allow_ingress_from_namespace: true
      allow_egress_to_internet: false