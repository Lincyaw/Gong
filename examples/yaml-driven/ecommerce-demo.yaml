name: ecommerce-demo
description: "E-commerce microservices simulation with order, user, and product services"

services:
  - name: user-service
    replicas: 2
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
    dependencies:
      services: []
      datastores:
        - name: users-db
          type: postgres
          provisioning:
            mode: dynamic
            chart: "bitnami/postgresql:13.x"
          teardown_policy: deletePvc
    observability:
      logging:
        level: INFO
        format: JSON
      tracing:
        sampling_rate: 0.8
    endpoints:
      - path: /v1/users/{user_id}
        method: GET
        workflow:
          - name: get_user_from_db
            template: io/postgres_query
            params:
              query: "SELECT * FROM users WHERE id = $1"
              params: ["{user_id}"]
            output: user_data
          - name: return_user_response
            template: control_flow/return_http_response
            params:
              status_code: 200
              body: "{context.user_data}"

  - name: product-service
    replicas: 2
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
    dependencies:
      services: []
      datastores:
        - name: products-db
          type: postgres
          provisioning:
            mode: dynamic
            chart: "bitnami/postgresql:13.x"
          teardown_policy: deletePvc
        - name: product-cache
          type: redis
          provisioning:
            mode: dynamic
            chart: "bitnami/redis:6.x"
          teardown_policy: deletePvc
    observability:
      logging:
        level: INFO
        format: JSON
      tracing:
        sampling_rate: 0.8
    endpoints:
      - path: /v1/products/{product_id}
        method: GET
        workflow:
          - name: check_cache
            template: io/redis_get
            params:
              key: "product:{product_id}"
            output: cached_product
          - name: get_from_db_if_not_cached
            template: io/postgres_query
            params:
              query: "SELECT * FROM products WHERE id = $1"
              params: ["{product_id}"]
            output: product_data
          - name: cache_result
            template: io/redis_set
            params:
              key: "product:{product_id}"
              value: "{context.product_data}"
              ttl: 3600
          - name: return_product_response
            template: control_flow/return_http_response
            params:
              status_code: 200
              body: "{context.product_data}"

  - name: order-service
    replicas: 3
    resources:
      requests:
        cpu: "150m"
        memory: "256Mi"
      limits:
        cpu: "300m"
        memory: "512Mi"
    dependencies:
      services:
        - user-service
        - product-service
      datastores:
        - name: orders-db
          type: postgres
          provisioning:
            mode: dynamic
            chart: "bitnami/postgresql:13.x"
          teardown_policy: deletePvc
    observability:
      logging:
        level: INFO
        format: JSON
      tracing:
        sampling_rate: 1.0
    endpoints:
      - path: /v1/orders
        method: POST
        workflow:
          - name: validate_request
            template: security/jwt_token_validation
            params:
              token: "{header.Authorization}"
              jwks_url: "https://auth.example.com/.well-known/jwks.json"
            on_failure: return_401_unauthorized
            output: user_info

          - name: get_user_and_product
            template: control_flow/parallel_execution
            branches:
              - name: get_user_info
                template: io/http_api_call
                params:
                  target_service: user-service
                  path: "/v1/users/{body.userId}"
                  method: GET
                output: user_profile

              - name: get_product_info
                template: io/http_api_call
                params:
                  target_service: product-service
                  path: "/v1/products/{body.productId}"
                  method: GET
                output: product_details

          - name: calculate_total
            template: logic/custom_function_call
            params:
              functionName: calculate_order_total
              arguments:
                price: "{context.product_details.price}"
                quantity: "{body.quantity}"
                discount_level: "{context.user_profile.discount_level}"
            output: final_price

          - name: save_to_db
            template: io/postgres_write
            inject_faults:
              - type: latency
                probability: 0.05
                value: "normal(150, 20)"
            params:
              query: "INSERT INTO orders (user_id, product_id, quantity, total) VALUES ($1, $2, $3, $4) RETURNING id"
              query_params:
                - "{body.userId}"
                - "{body.productId}"
                - "{body.quantity}"
                - "{context.final_price}"
            output: order_result

          - name: return_response
            template: control_flow/return_http_response
            params:
              status_code: 201
              body:
                orderId: "{context.order_result.id}"
                total: "{context.final_price}"
                status: "created"

scenario:
  name: black-friday-simulation
  description: "Simulate Black Friday traffic patterns with chaos engineering"
  events:
    - timestamp: "0s"
      type: traffic
      config:
        name: baseline-traffic
        type: constant
        params:
          users: 10
          duration: "5m"
          target_host: order-service
    
    - timestamp: "5m"
      type: traffic
      config:
        name: peak-traffic
        type: ramp
        params:
          start_users: 10
          end_users: 100
          duration: "10m"
          target_host: order-service
    
    - timestamp: "10m"
      type: chaos
      config:
        name: database-latency
        type: network-latency
        target:
          service: orders-db
        params:
          latency: "200ms"
          duration: "2m"

global_config:
  namespace_prefix: "sim"
  monitoring:
    jaeger_enabled: true
    prometheus_enabled: true
  security:
    network_policies_enabled: true
  resource_limits:
    max_cpu_per_service: "1000m"
    max_memory_per_service: "1Gi"